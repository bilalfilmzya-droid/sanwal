name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Unzip Project
        run: unzip SanwalApp.zip
        
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: cd SanwalApp && chmod +x gradlew
        
      - name: Build APK
        run: cd SanwalApp && ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Sanwal-App
          path: SanwalApp/app/build/outputs/apk/debug/*.apk
