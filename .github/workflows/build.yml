name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Project
        run: unzip SanwalApp.zip

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          export PATH=$PATH:$PWD/gradle-8.0/bin
          echo "$PWD/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd SanwalApp
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sanwal-App
          path: SanwalApp/app/build/outputs/apk/debug/*.apk
          
